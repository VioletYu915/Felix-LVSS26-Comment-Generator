        generateBtn.addEventListener('click', () => {
            // 生成一个随机索引
            const randomIndex = Math.floor(Math.random() * comments.length);
            
            // 获取随机评论
            const randomComment = comments[randomIndex];
            
            // 显示评论到页面上
            commentDisplay.textContent = randomComment;
            commentDisplay.style.color = '#333';
            commentDisplay.style.fontStyle = 'normal';
            
            // 使用 Clipboard API 复制到剪贴板
            navigator.clipboard.writeText(randomComment).then(() => {
                // 复制成功后，显示提示信息
                copyFeedback.textContent = '已复制到剪贴板！✅';
                copyFeedback.style.color = '#28a745';
                copyFeedback.classList.add('show');
                
                // 2秒后自动隐藏提示信息

                    copyFeedback.classList.remove('show');
                }, 2000);
            }).catch(err => {
                // 如果复制失败，在控制台打印错误

                copyFeedback.textContent = '复制失败，请手动复制！';
                copyFeedback.style.color = 'red';
                copyFeedback.classList.add('show');
                setTimeout(() => {

            });
